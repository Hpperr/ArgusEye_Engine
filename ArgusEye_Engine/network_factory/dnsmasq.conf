# ARGUS-EYE - DHCP Configuration
# Auto-updated by run_tactical.sh

# Interface will be dynamically set
interface=wlan0

# DHCP range for rogue network
dhcp-range=192.168.2.10,192.168.2.50,255.255.255.0,12h

# Gateway and DNS
dhcp-option=3,192.168.2.1
dhcp-option=6,192.168.2.1

# Upstream DNS
server=8.8.8.8
server=1.1.1.1

# Logging
log-dhcp
log-queries

# Lease file
dhcp-leasefile=/tmp/dnsmasq.leases
